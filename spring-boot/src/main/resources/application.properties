spring.application.name=demo
spring.datasource.url=jdbc:sqlite:./data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
server.address=0.0.0.0

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.root=INFO
logging.level.com.example.springboot=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

homeassistant.apiKey=${HOMEASSISTANT_API_KEY}
homeassistant.baseUrl=http://192.168.2.66:8123
homeassistant.telemetry.database-logging-enabled=false

automation.bathroom-occupancy.enabled=false
automation.bathroom-occupancy.off-delay-seconds=300
# Example:
automation.bathroom-occupancy.enabled=true
automation.bathroom-occupancy.sensor-entity-id=binary_sensor.bathroom_motion_sensor_occupancy
automation.bathroom-occupancy.light-entity-id=light.gledopto_light

journal.storage.markdown-root=./data/journal/entries
journal.storage.image-root=./data/journal/images

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Optional OneDrive backup for journal markdown and images (delegated refresh-token flow).
# Use the bootstrap endpoints/page to provision refresh token server-side for personal OneDrive.
journal.backup.onedrive.enabled=false
journal.backup.onedrive.cron=0 0 * * * *
journal.backup.onedrive.credentials-file=./data/journal/onedrive/credentials.json
journal.backup.onedrive.state-file=./data/journal/onedrive/backup-state.json

