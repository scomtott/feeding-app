<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link rel="stylesheet" href="../css/journal.css">
</head>
<body>
    <div class="container">
        <nav id="main-nav"></nav>

        <h1>Daily Journal</h1>

        <section class="date-controls">
            <h2>Date Selection</h2>
            <div class="date-controls-row">
                <button type="button" class="btn-secondary" id="prev-day">Previous Day</button>
                <input type="date" id="entry-date" required>
                <button type="button" class="btn-secondary" id="next-day">Next Day</button>
                <button type="button" id="load-today">Today</button>
            </div>
            <div class="month-controls-row">
                <label for="month-picker">Browse Month:</label>
                <input type="month" id="month-picker">
            </div>
            <div id="status-message" class="status-message"></div>
        </section>

        <section class="month-index-section">
            <h2>Days With Entries</h2>
            <div id="month-index" class="month-index"></div>
        </section>

        <section class="backup-status-section">
            <h2>OneDrive Backup Status</h2>
            <div class="backup-actions">
                <button type="button" id="trigger-backup" class="btn-secondary">Run Backup Now</button>
            </div>
            <div class="backup-status-grid">
                <div><strong>State:</strong> <span id="backup-state">Loading...</span></div>
                <div><strong>Last Run:</strong> <span id="backup-last-run">-</span></div>
                <div><strong>Last Success:</strong> <span id="backup-last-success">-</span></div>
                <div><strong>Result:</strong> <span id="backup-message">-</span></div>
                <div><strong>Files Scanned:</strong> <span id="backup-files-scanned">0</span></div>
                <div><strong>Files Uploaded:</strong> <span id="backup-files-uploaded">0</span></div>
            </div>
        </section>

        <section class="mode-toggle-section">
            <h2>Mode</h2>
            <div class="mode-toggle" role="tablist" aria-label="Journal mode selector">
                <button type="button" id="browse-mode-button" class="mode-button active" aria-pressed="true">Browse Mode</button>
                <button type="button" id="edit-mode-button" class="mode-button" aria-pressed="false">Edit Mode</button>
            </div>
        </section>

        <section class="editor-section hidden-section" id="editor-section">
            <h2>Edit Entry</h2>
            <textarea id="markdown-editor" placeholder="Write your markdown for the selected date..."></textarea>
            <div class="editor-controls">
                <button type="button" id="save-entry">Save Entry</button>
            </div>

            <div class="upload-controls">
                <label for="image-input">Upload image:</label>
                <input type="file" id="image-input" accept="image/*">
                <button type="button" class="btn-secondary" id="upload-image">Upload And Insert Markdown</button>
            </div>
        </section>

        <section class="preview-section" id="preview-section">
            <h2>Browse Rendered Entry</h2>
            <div id="rendered-entry" class="rendered-entry"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="../js/logger.js"></script>
    <script src="../js/nav.js?v=2"></script>
    <script src="../js/journal.js"></script>
</body>
</html>
